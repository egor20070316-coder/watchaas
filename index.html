<!-- Форма добавления отзыва -->
<div class="form-card" style="margin-bottom: 30px;">
    <h3>Оставить отзыв</h3>
    <form id="reviewForm">
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Ваша оценка</label>
            <div style="display: flex; gap: 8px; font-size: 40px; direction: rtl; justify-content: flex-start;">
                <span class="star" data-value="5" style="cursor: pointer; color: #ddd;">☆</span>
                <span class="star" data-value="4" style="cursor: pointer; color: #ddd;">☆</span>
                <span class="star" data-value="3" style="cursor: pointer; color: #ddd;">☆</span>
                <span class="star" data-value="2" style="cursor: pointer; color: #ddd;">☆</span>
                <span class="star" data-value="1" style="cursor: pointer; color: #ddd;">☆</span>
            </div>
            <input type="hidden" id="reviewRating" value="0">
        </div>
        
        <div class="form-group" style="margin-bottom: 15px;">
            <label for="reviewAuthor">Ваше имя</label>
            <input type="text" id="reviewAuthor" placeholder="Введите ваше имя" required>
        </div>
        <div class="form-group" style="margin-bottom: 15px;">
            <label for="reviewText">Текст отзыва</label>
            <textarea id="reviewText" rows="3" placeholder="Поделитесь впечатлениями о часах..." required></textarea>
        </div>
        <button type="submit" class="button">Отправить отзыв</button>
    </form>
</div>
