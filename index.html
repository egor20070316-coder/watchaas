<section class="section tab-section" id="product">
  <div class="container">
    <a class="back-link" href="#catalog" data-tab="catalog">← Назад в каталог</a>
    <div id="productDetail"></div>
    
    <!-- БЛОК ДЛЯ ОТЗЫВОВ О ТОВАРЕ -->
    <div id="productReviews" style="margin-top: 40px; border-top: 1px solid var(--color-border); padding-top: 30px;">
      <h2 style="font: 700 28px Georgia, serif;">Отзывы о модели</h2>
      
      <!-- Форма добавления отзыва -->
      <div class="form-card" style="margin-bottom: 30px;">
        <h3>Оставить отзыв</h3>
        <form id="reviewForm">
          <div class="form-group" style="margin-bottom: 15px;">
            <label>Ваша оценка</label>
            <div id="starRating" style="display: flex; gap: 8px; font-size: 32px; cursor: pointer;">
              <span data-star="1" style="color: #ddd;">☆</span>
              <span data-star="2" style="color: #ddd;">☆</span>
              <span data-star="3" style="color: #ddd;">☆</span>
              <span data-star="4" style="color: #ddd;">☆</span>
              <span data-star="5" style="color: #ddd;">☆</span>
            </div>
            <input type="hidden" id="reviewRating" value="0">
          </div>
          <div class="form-group" style="margin-bottom: 15px;">
            <label for="reviewAuthor">Ваше имя</label>
            <input type="text" id="reviewAuthor" placeholder="Введите ваше имя" required>
          </div>
          <div class="form-group" style="margin-bottom: 15px;">
            <label for="reviewText">Текст отзыва</label>
            <textarea id="reviewText" rows="3" placeholder="Поделитесь впечатлениями о часах..." required></textarea>
          </div>
          <button type="submit" class="button">Отправить отзыв</button>
        </form>
      </div>
      
      <!-- Список отзывов о товаре -->
      <div id="productReviewsList">
        <p style="color: var(--color-muted);">Пока нет отзывов. Будьте первым!</p>
      </div>
    </div>
  </div>
</section>
