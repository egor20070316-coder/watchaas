<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchaas — Отзывы с рейтингом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f7f4ef;
            color: #242220;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 16px 45px rgba(35, 31, 26, 0.09);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }
        .product {
            border-bottom: 2px solid #ddd5ca;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .product h2 {
            font-size: 22px;
            margin-bottom: 8px;
        }
        .product p {
            color: #746f68;
        }

        /* Форма */
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd5ca;
            border-radius: 8px;
            font-size: 16px;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* ЗВЁЗДЫ */
        .stars {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 5px;
            font-size: 36px;
            cursor: pointer;
        }
        .stars span {
            color: #ddd;
            transition: color 0.15s;
            user-select: none;
        }
        .stars span.active,
        .stars span:hover,
        .stars span:hover ~ span {
            color: #b68b4c;
        }

        .btn {
            background: #b68b4c;
            color: #171716;
            border: none;
            padding: 12px 24px;
            border-radius: 9px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:hover {
            background: #c79c5a;
        }

        /* Список отзывов */
        .review-list {
            margin-top: 30px;
            border-top: 2px solid #ddd5ca;
            padding-top: 20px;
        }
        .review-item {
            background: #faf8f4;
            border: 1px solid #ddd5ca;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .review-item .author {
            font-weight: bold;
        }
        .review-item .rating {
            color: #b68b4c;
            font-size: 20px;
            margin-left: 10px;
        }
        .review-item .text {
            margin: 8px 0;
        }
        .review-item .date {
            color: #746f68;
            font-size: 13px;
        }
        .empty {
            color: #746f68;
            text-align: center;
            padding: 20px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #171716;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="container">

    <h1>⌚ Watchaas — Отзывы</h1>

    <!-- Блок товара -->
    <div class="product">
        <h2>Casio F-91W</h2>
        <p>Культовые электронные часы. Лёгкие, надёжные, с подсветкой.</p>
    </div>

    <!-- Форма отзыва -->
    <form id="reviewForm">
        <div class="form-group">
            <label>Ваше имя</label>
            <input type="text" id="reviewAuthor" placeholder="Введите ваше имя" required>
        </div>

        <div class="form-group">
            <label>Оценка</label>
            <div class="stars" id="starContainer">
                <span data-value="5">☆</span>
                <span data-value="4">☆</span>
                <span data-value="3">☆</span>
                <span data-value="2">☆</span>
                <span data-value="1">☆</span>
            </div>
            <input type="hidden" id="reviewRating" value="0">
        </div>

        <div class="form-group">
            <label>Текст отзыва</label>
            <textarea id="reviewText" placeholder="Поделитесь впечатлениями..." required></textarea>
        </div>

        <button type="submit" class="btn">Отправить отзыв</button>
    </form>

    <!-- Список отзывов -->
    <div class="review-list" id="reviewList">
        <div class="empty">Пока нет отзывов. Будьте первым!</div>
    </div>
</div>

<!-- Toast уведомление -->
<div class="toast" id="toast">✅ Отзыв добавлен!</div>

<script>
    // ============================================================
    // ВСЯ ЛОГИКА — ЗДЕСЬ
    // ============================================================

    const STORAGE_KEY = 'watchaas_reviews_demo';

    // ----- Получить все отзывы -----
    function getReviews() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        } catch {
            return [];
        }
    }

    // ----- Сохранить отзывы -----
    function saveReviews(reviews) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(reviews));
    }

    // ----- Добавить отзыв -----
    function addReview(author, rating, text) {
        const reviews = getReviews();
        const newReview = {
            id: Date.now().toString(),
            author: author.trim(),
            rating: parseInt(rating),
            text: text.trim(),
            date: new Date().toISOString()
        };
        reviews.push(newReview);
        saveReviews(reviews);
        return newReview;
    }

    // ----- Отрисовать отзывы -----
    function renderReviews() {
        const container = document.getElementById('reviewList');
        const reviews = getReviews();

        if (reviews.length === 0) {
            container.innerHTML = '<div class="empty">Пока нет отзывов. Будьте первым!</div>';
            return;
        }

        // Сортируем по дате (новые сверху)
        const sorted = [...reviews].sort((a, b) => new Date(b.date) - new Date(a.date));

        container.innerHTML = sorted.map(r => `
            <div class="review-item">
                <div>
                    <span class="author">${r.author}</span>
                    <span class="rating">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                </div>
                <div class="text">${r.text}</div>
                <div class="date">${new Date(r.date).toLocaleDateString('ru-RU')}</div>
            </div>
        `).join('');
    }

    // ============================================================
    // ЗВЁЗДЫ — 100% РАБОТАЮТ
    // ============================================================
    function initStars() {
        const stars = document.querySelectorAll('#starContainer span');
        const ratingInput = document.getElementById('reviewRating');

        stars.forEach(star => {
            // Клик — выбираем звезду
            star.addEventListener('click', function() {
                const value = parseInt(this.dataset.value);
                ratingInput.value = value;

                stars.forEach(s => {
                    const val = parseInt(s.dataset.value);
                    if (val <= value) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
            });

            // Ховер — подсветка
            star.addEventListener('mouseenter', function() {
                const value = parseInt(this.dataset.value);
                stars.forEach(s => {
                    const val = parseInt(s.dataset.value);
                    if (val <= value) {
                        s.style.color = '#b68b4c';
                    } else {
                        s.style.color = '#ddd';
                    }
                });
            });

            star.addEventListener('mouseleave', function() {
                const current = parseInt(ratingInput.value);
                stars.forEach(s => {
                    const val = parseInt(s.dataset.value);
                    if (current > 0 && val <= current) {
                        s.style.color = '#b68b4c';
                        s.classList.add('active');
                    } else {
                        s.style.color = '#ddd';
                        s.classList.remove('active');
                    }
                });
            });
        });
    }

    // ============================================================
    // ОТПРАВКА ФОРМЫ
    // ============================================================
    document.getElementById('reviewForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const author = document.getElementById('reviewAuthor').value.trim();
        const rating = document.getElementById('reviewRating').value;
        const text = document.getElementById('reviewText').value.trim();

        if (!author || !rating || rating === '0' || !text) {
            showToast('⚠️ Заполните все поля и поставьте оценку!', 'error');
            return;
        }

        addReview(author, rating, text);

        // Очищаем форму
        document.getElementById('reviewAuthor').value = '';
        document.getElementById('reviewText').value = '';
        document.getElementById('reviewRating').value = '0';

        // Сбрасываем звёзды
        document.querySelectorAll('#starContainer span').forEach(s => {
            s.classList.remove('active');
            s.style.color = '#ddd';
        });

        renderReviews();
        showToast('✅ Отзыв добавлен! Спасибо!');
    });

    // ============================================================
    // TOAST УВЕДОМЛЕНИЯ
    // ============================================================
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.background = type === 'error' ? '#a53b35' : '#171716';
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    // ============================================================
    // ЗАПУСК
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        initStars();
        renderReviews();
        console.log('✅ Всё работает! Звёзды кликаются, отзывы сохраняются.');
    });
</script>

</body>
</html>
