<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход / Регистрация — Watchaas</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            padding: 30px;
        }
        .auth-container {
            max-width: 440px;
            width: 100%;
            background: var(--color-surface);
            border-radius: var(--radius);
            padding: 40px 36px;
            box-shadow: var(--shadow);
            border: 1px solid var(--color-border);
        }
        .auth-container h1 {
            font: 700 32px Georgia, serif;
            margin: 0 0 8px;
        }
        .auth-container p {
            color: var(--color-muted);
            margin: 0 0 28px;
        }
        .auth-container .form-group {
            margin-bottom: 18px;
        }
        .auth-container label {
            display: block;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 5px;
        }
        .auth-container input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            box-sizing: border-box;
        }
        .auth-container input:focus {
            outline: 3px solid rgba(182, 139, 76, 0.22);
            border-color: var(--color-accent);
        }
        .auth-container .button {
            width: 100%;
            justify-content: center;
            padding: 14px;
            font-size: 16px;
        }
        .auth-container .switch-link {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: var(--color-muted);
        }
        .auth-container .switch-link a {
            color: var(--color-accent-dark);
            font-weight: 700;
            cursor: pointer;
        }
        .auth-container .switch-link a:hover {
            text-decoration: underline;
        }
        .auth-container .error-msg {
            background: #fde8e6;
            color: var(--color-danger);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .auth-container .success-msg {
            background: #e6f4e8;
            color: #2a7a4a;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .auth-container .hidden {
            display: none !important;
        }
        .back-to-site {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--color-muted);
            font-size: 14px;
        }
        .back-to-site:hover {
            color: var(--color-accent-dark);
        }
    </style>
</head>
<body>

<div class="auth-page">
    <div class="auth-container">

        <a href="index.html" class="back-to-site">← На главную</a>

        <h1 id="form-title">Вход</h1>
        <p id="form-subtitle">Войдите в свой аккаунт, чтобы продолжить</p>

        <div id="error-msg" class="error-msg"></div>
        <div id="success-msg" class="success-msg"></div>

        <form id="auth-form">

            <div id="name-field" class="form-group hidden">
                <label for="fullname">Имя</label>
                <input type="text" id="fullname" placeholder="Введите ваше имя" autocomplete="name" />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="example@mail.com" required autocomplete="email" />
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Минимум 6 символов" required minlength="6" autocomplete="current-password" />
            </div>

            <button type="submit" class="button" id="submit-btn">Войти</button>

        </form>

        <div class="switch-link">
            <span id="switch-text">Нет аккаунта?</span>
            <a id="switch-link">Зарегистрироваться</a>
        </div>

    </div>
</div>

<!-- ВЕСЬ КОД ВСТРОЕН ПРЯМО СЮДА -->
<script>
// ============================================================
// database.js — ВСТРОЕННЫЙ
// ============================================================
const DB = {
    STORAGE_KEY: 'watchaas_users',
    getUsers() {
        try {
            const data = localStorage.getItem(this.STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        } catch {
            return [];
        }
    },
    saveUsers(users) {
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(users));
    },
    findByEmail(email) {
        const users = this.getUsers();
        return users.find(u => u.email.toLowerCase() === email.toLowerCase());
    },
    authenticate(email, password) {
        const users = this.getUsers();
        return users.find(u => 
            u.email.toLowerCase() === email.toLowerCase() && 
            u.password === password
        );
    },
    register(name, email, password) {
        if (this.findByEmail(email)) {
            return { success: false, error: 'Пользователь с таким email уже существует' };
        }
        const users = this.getUsers();
        const newUser = {
            id: Date.now().toString(),
            name: name.trim(),
            email: email.trim().toLowerCase(),
            password: password,
            createdAt: new Date().toISOString()
        };
        users.push(newUser);
        this.saveUsers(users);
        return { success: true, user: newUser };
    },
    count() {
        return this.getUsers().length;
    },
    clearAll() {
        localStorage.removeItem(this.STORAGE_KEY);
    }
};
console.log('✅ DB загружена');

// ============================================================
// auth.js — ВСТРОЕННЫЙ
// ============================================================
let currentUser = null;

// Получаем элементы
const form = document.getElementById('auth-form');
const formTitle = document.getElementById('form-title');
const formSubtitle = document.getElementById('form-subtitle');
const submitBtn = document.getElementById('submit-btn');
const switchLink = document.getElementById('switch-link');
const switchText = document.getElementById('switch-text');
const nameField = document.getElementById('name-field');
const fullnameInput = document.getElementById('fullname');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const errorMsg = document.getElementById('error-msg');
const successMsg = document.getElementById('success-msg');

let currentMode = 'login';

function switchMode(mode) {
    currentMode = mode;
    if (mode === 'login') {
        formTitle.textContent = 'Вход';
        formSubtitle.textContent = 'Войдите в свой аккаунт, чтобы продолжить';
        submitBtn.textContent = 'Войти';
        switchText.textContent = 'Нет аккаунта?';
        switchLink.textContent = 'Зарегистрироваться';
        nameField.classList.add('hidden');
        fullnameInput.removeAttribute('required');
        passwordInput.setAttribute('autocomplete', 'current-password');
    } else {
        formTitle.textContent = 'Регистрация';
        formSubtitle.textContent = 'Создайте аккаунт, чтобы пользоваться всеми функциями';
        submitBtn.textContent = 'Зарегистрироваться';
        switchText.textContent = 'Уже есть аккаунт?';
        switchLink.textContent = 'Войти';
        nameField.classList.remove('hidden');
        fullnameInput.setAttribute('required', 'required');
        passwordInput.setAttribute('autocomplete', 'new-password');
    }
    hideMessages();
}

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    successMsg.style.display = 'none';
}

function showSuccess(msg) {
    successMsg.textContent = msg;
    successMsg.style.display = 'block';
    errorMsg.style.display = 'none';
}

function hideMessages() {
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';
}

// Обработка формы
form.addEventListener('submit', function(e) {
    e.preventDefault();
    hideMessages();

    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (!email || !password) {
        showError('Пожалуйста, заполните все поля');
        return;
    }

    if (password.length < 6) {
        showError('Пароль должен содержать минимум 6 символов');
        return;
    }

    if (currentMode === 'login') {
        // ВХОД
        const user = DB.authenticate(email, password);
        if (user) {
            currentUser = user;
            showSuccess(`Добро пожаловать, ${user.name}! 🎉`);
            localStorage.setItem('watchaas_current_user', JSON.stringify(user));
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        } else {
            showError('Неверный email или пароль. Попробуйте снова.');
        }
    } else {
        // РЕГИСТРАЦИЯ
        const name = fullnameInput.value.trim();
        if (!name) {
            showError('Пожалуйста, введите ваше имя');
            return;
        }

        const result = DB.register(name, email, password);
        if (result.success) {
            showSuccess(`Аккаунт создан! Добро пожаловать, ${name}! 🎉`);
            fullnameInput.value = '';
            emailInput.value = '';
            passwordInput.value = '';
            setTimeout(() => {
                switchMode('login');
                hideMessages();
                emailInput.value = email;
                showSuccess('Теперь вы можете войти в свой аккаунт!');
            }, 1500);
        } else {
            showError(result.error);
        }
    }
});

// Переключение режима
switchLink.addEventListener('click', function(e) {
    e.preventDefault();
    hideMessages();
    if (currentMode === 'login') {
        switchMode('register');
    } else {
        switchMode('login');
    }
});

// Проверка сессии
function checkSession() {
    const savedUser = localStorage.getItem('watchaas_current_user');
    if (savedUser) {
        try {
            currentUser = JSON.parse(savedUser);
            const userInDB = DB.findByEmail(currentUser.email);
            if (userInDB) {
                currentUser = userInDB;
                showSuccess(`Вы уже вошли как ${currentUser.name}`);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                localStorage.removeItem('watchaas_current_user');
                currentUser = null;
            }
        } catch {
            localStorage.removeItem('watchaas_current_user');
            currentUser = null;
        }
    }
}

checkSession();
switchMode('login');
console.log('✅ auth.js загружен');
</script>

</body>
</html>
